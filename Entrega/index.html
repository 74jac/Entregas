<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro Arqueológico v2.0</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Inventario de Campo</h1>
        <p>Gestión de hallazgos y patrimonio</p>
    </header>

    <main>
        <section id="formulario-contenedor">
            <h2>Registrar Nuevo Hallazgo</h2>
            <form id="formulario-hallazgo">
                <input type="text" id="input-id" placeholder="ID de la pieza (ej: ARQ-001)" required>
                <input type="text" id="input-tipo" placeholder="Tipo (Cerámica, Lítico...)" required>
                <input type="text" id="input-material" placeholder="Material predominante" required>
                <button type="submit" id="btn-guardar">Guardar en Inventario</button>
            </form>
        </section>

        <section id="inventario-contenedor">
            <h2>Piezas Registradas</h2>
            <div id="lista-hallazgos">
                </div>
            <button id="btn-limpiar">Vaciar Inventario</button>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
